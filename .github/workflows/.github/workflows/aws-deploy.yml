name: AWS Infrastructure Pipeline

on:
  push:
    branches: [main]
    paths:
      - "terraform/modules/ec2/**"
      - "terraform/modules/ecs-eks/**"
      - "terraform/environments/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/modules/ec2/**"
      - "terraform/modules/ecs-eks/**"
      - "terraform/environments/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      compute_type:
        description: "Compute platform"
        required: true
        default: "ec2"
        type: choice
        options: [ec2, ecs, eks]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: "us-east-1"
  COMPUTE_TYPE: ${{ github.event.inputs.compute_type || 'ec2' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ─────────────────────────────────────────────
  # SECURITY & LINT
  # ─────────────────────────────────────────────
  security-scan:
    name: Security scan (tfsec + checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform
          soft_fail: false

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli
          soft_fail: false

      - name: Terraform format check
        run: terraform fmt -check -recursive ./terraform

  # ─────────────────────────────────────────────
  # PLAN
  # ─────────────────────────────────────────────
  plan:
    name: Terraform Plan (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}/aws-${{ env.COMPUTE_TYPE }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          terraform plan \
            -var="compute_type=${{ env.COMPUTE_TYPE }}" \
            -var-file="aws.tfvars" \
            -out=aws.tfplan -no-color 2>&1 | tee plan_output.txt

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('./terraform/environments/${{ env.ENVIRONMENT }}/plan_output.txt', 'utf8');
            const body = out.length > 60000 ? out.slice(0, 60000) + '\n...(truncated)' : out;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### AWS Terraform Plan — \`${{ env.COMPUTE_TYPE }}\` on \`${{ env.ENVIRONMENT }}\`\n\`\`\`\n${body}\n\`\`\``
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-tfplan-${{ env.ENVIRONMENT }}-${{ env.COMPUTE_TYPE }}
          path: ./terraform/environments/${{ env.ENVIRONMENT }}/aws.tfplan
          retention-days: 3

  # ─────────────────────────────────────────────
  # APPLY DEV (auto on main merge)
  # ─────────────────────────────────────────────
  apply-dev:
    name: Apply → dev
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: dev

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ./terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/aws-${{ env.COMPUTE_TYPE }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Apply
        working-directory: ./terraform/environments/dev
        run: |
          terraform apply \
            -var="compute_type=${{ env.COMPUTE_TYPE }}" \
            -var-file="aws.tfvars" \
            -auto-approve

      - name: Integration tests
        run: ./scripts/validate.sh aws dev ${{ env.COMPUTE_TYPE }}

  # ─────────────────────────────────────────────
  # APPLY STAGING (auto after dev passes)
  # ─────────────────────────────────────────────
  apply-staging:
    name: Apply → staging
    runs-on: ubuntu-latest
    needs: apply-dev
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init + Apply
        working-directory: ./terraform/environments/staging
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/aws-${{ env.COMPUTE_TYPE }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"
          terraform apply \
            -var="compute_type=${{ env.COMPUTE_TYPE }}" \
            -var-file="aws.tfvars" \
            -auto-approve

  # ─────────────────────────────────────────────
  # APPLY PROD (manual approval gate)
  # ─────────────────────────────────────────────
  apply-prod:
    name: Apply → prod (approval required)
    runs-on: ubuntu-latest
    needs: apply-staging
    environment:
      name: prod   # Set required reviewers in GitHub repo settings → Environments

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init + Apply
        working-directory: ./terraform/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/aws-${{ env.COMPUTE_TYPE }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"
          terraform apply \
            -var="compute_type=${{ env.COMPUTE_TYPE }}" \
            -var-file="aws.tfvars" \
            -auto-approve
