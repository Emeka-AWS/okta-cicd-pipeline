name: Okta Infrastructure Pipeline

on:
  push:
    branches: [main]
    paths:
      - "terraform/modules/okta/**"
      - "terraform/environments/**/okta.tfvars"
  pull_request:
    branches: [main]
    paths:
      - "terraform/modules/okta/**"
      - "terraform/environments/**/okta.tfvars"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]

permissions:
  id-token: write       # Required for OIDC token
  contents: read
  pull-requests: write  # Post plan output as PR comment

env:
  TF_VERSION: "1.6.6"
  TF_WORKING_DIR: "./terraform/environments/${{ github.event.inputs.environment || 'dev' }}"

jobs:
  # ─────────────────────────────────────────────
  # VALIDATE — runs on every PR
  # ─────────────────────────────────────────────
  validate:
    name: Validate Okta Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ./terraform/modules/okta

      - name: Terraform Init (no backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Run tfsec (security scan)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform/modules/okta
          soft_fail: false

  # ─────────────────────────────────────────────
  # PLAN — posts output as PR comment
  # ─────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_okta_org_url: ${{ secrets.OKTA_ORG_URL }}
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}/okta.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_okta_org_url: ${{ secrets.OKTA_ORG_URL }}
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}
        run: |
          terraform plan -var-file="okta.tfvars" -out=okta.tfplan -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n... (truncated)'
              : planOutput;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Okta Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: okta-tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.TF_WORKING_DIR }}/okta.tfplan
          retention-days: 3

  # ─────────────────────────────────────────────
  # APPLY DEV — auto on merge to main
  # ─────────────────────────────────────────────
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: dev
      url: ${{ secrets.OKTA_ORG_URL }}/admin/dashboard

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/okta.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform Apply
        working-directory: ./terraform/environments/dev
        env:
          TF_VAR_okta_org_url: ${{ secrets.OKTA_ORG_URL }}
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}
        run: terraform apply -var-file="okta.tfvars" -auto-approve

      - name: Smoke test — verify Okta API
        env:
          OKTA_ORG_URL: ${{ secrets.OKTA_ORG_URL }}
          OKTA_API_TOKEN: ${{ secrets.OKTA_API_TOKEN }}
        run: ./scripts/validate.sh okta

  # ─────────────────────────────────────────────
  # APPLY PROD — manual approval gate
  # ─────────────────────────────────────────────
  apply-prod:
    name: Apply (prod) — requires approval
    runs-on: ubuntu-latest
    needs: apply-dev
    environment:
      name: prod          # GitHub environment with required reviewers configured
      url: ${{ secrets.OKTA_ORG_URL }}/admin/dashboard

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./terraform/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/okta.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform Apply
        working-directory: ./terraform/environments/prod
        env:
          TF_VAR_okta_org_url: ${{ secrets.OKTA_ORG_URL }}
          TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}
        run: terraform apply -var-file="okta.tfvars" -auto-approve
